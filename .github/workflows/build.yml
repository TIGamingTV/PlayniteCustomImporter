name: Build

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore PlayniteCustomImporter.sln

      - name: Stamp version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          (Get-Content extension.yaml) -replace '^Version:.*', "Version: $version" | Set-Content extension.yaml
          Write-Host "Stamped extension.yaml version to $version"

      - name: Build (Release)
        run: msbuild PlayniteCustomImporter.sln /p:Configuration=Release /p:Platform="Any CPU"

      - name: Stage extension output
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item bin/Release/PlayniteCustomImporter.dll dist/
          Copy-Item extension.yaml dist/
          Copy-Item icon.png dist/

      - name: Package .pext
        shell: pwsh
        run: |
          Compress-Archive -Path dist/* -DestinationPath PlayniteCustomImporter.zip -Force
          Move-Item PlayniteCustomImporter.zip PlayniteCustomImporter.pext -Force

      - name: Upload .pext artifact
        uses: actions/upload-artifact@v4
        with:
          name: PlayniteCustomImporter-pext
          path: PlayniteCustomImporter.pext

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: PlayniteCustomImporter.pext
